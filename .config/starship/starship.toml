[git_branch]
symbol = "´Éİ"
style = "bg:git_bg"
format = '[[ $symbol $branch](fg:git_fg bg:git_bg)]($style)'

[git_status]
style = "bg:git_bg"
format = '[[($all_status$ahead_behind )](fg:git_fg bg:git_bg)]($style)'
ahead = " Ôçí${count}"
behind = " Ôçú${count}"
modified = " !${count}"
untracked = " ?${count}"
staged = " +${count}"
stashed = " \\$${count}"

